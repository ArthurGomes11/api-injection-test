<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel da API Injection Test</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>

  <header class="hero">
    <h1>Injection Store Dashboard</h1>
    <p>Cliente web simples para autenticar e operar produtos desta API.</p>
    <div class="status-bar">
      <span id="statusText">Nao autenticado</span>
      <button id="logoutBtn" class="ghost" disabled>Sair</button>
    </div>
  </header>

  <main class="grid">
    <section class="card">
      <h2>Configuracao</h2>
      <label for="baseUrl">Base URL da API</label>
      <input id="baseUrl" type="text" placeholder="http://localhost:3000" />
      <small>Se vazio, usa a mesma origem da pagina.</small>
      <button id="saveBaseUrlBtn">Salvar URL</button>
    </section>

    <section class="card">
      <h2>Entrar</h2>
      <form id="loginForm">
        <label for="loginEmail">Email</label>
        <input id="loginEmail" type="email" required />

        <label for="loginPassword">Senha</label>
        <input id="loginPassword" type="password" required />

        <button type="submit">Login</button>
      </form>
    </section>

    <section class="card">
      <h2>Criar conta</h2>
      <form id="registerForm">
        <label for="registerName">Nome</label>
        <input id="registerName" type="text" required />

        <label for="registerEmail">Email</label>
        <input id="registerEmail" type="email" required />

        <label for="registerPassword">Senha</label>
        <input id="registerPassword" type="password" required />

        <button type="submit">Registrar</button>
      </form>
    </section>

    <section class="card wide">
      <div class="section-head">
        <h2>Produtos</h2>
        <button id="refreshProductsBtn" class="ghost">Atualizar</button>
      </div>
      <p id="roleInfo" class="hint">Operacoes de escrita exigem perfil admin.</p>

      <form id="productForm" class="product-form">
        <h3>Novo produto (admin)</h3>

        <label for="productName">Nome</label>
        <input id="productName" type="text" required />

        <label for="productCategory">Categoria</label>
        <input id="productCategory" type="text" required />

        <label for="productDescription">Descricao</label>
        <textarea id="productDescription" rows="3" required></textarea>

        <label for="productPrice">Preco</label>
        <input id="productPrice" type="number" min="0" step="0.01" required />

        <label for="productStock">Estoque</label>
        <input id="productStock" type="number" min="0" step="1" required />

        <button type="submit">Criar produto</button>
      </form>

      <div id="productsList" class="products-list"></div>
    </section>

    <section class="card wide log">
      <div class="section-head">
        <h2>Console</h2>
        <button id="clearLogBtn" class="ghost">Limpar</button>
      </div>
      <pre id="logOutput"></pre>
    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>
